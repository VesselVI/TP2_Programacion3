<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css"
        integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/styles.css">
    <script src="https://unpkg.com/boxicons@2.1.4/dist/boxicons.js" defer></script>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="/js/app.js" type="module" defer></script>



    <title>To-do List</title>
</head>

<body>
    <header>
        <div class="mainTitle">
            <h1>To do List TP2</h1>
        </div>

        <div class="inputContainer">
            <form class="form-inline d-flex flex-wrap align-items-end">
                <i class='bx bx-list-ul bx-lg bx-tada-hover listIcon'></i>
                <div class="noteDiv flex-fill">

                    <div class="form-group mx-sm-3 mb-2 w-80">
                        <input type="text" class="form-control form-control-lg w-100" id="inputNote"
                            placeholder="Escribir nueva nota...">
                    </div>
                </div>
                <div class="dateDiv">
                    <div class="form-group mb-2">
                        <label for="datePicker" class="mr-3" style="font-weight: 600;">Fecha de vencimiento: </label>
                        <input type="date" id="datePicker" class="form-control" placeholder="Select date">
                    </div>
                    <button type="submit" class="btn btn-success mb-2">Agregar Nota</button>
                </div>


            </form>
        </div>

    </header>
    <main>
        <div class="listContainer">
            <table class="table table-hover table-dark">
                <thead>
                    <tr>
                        <th scope="col">#</th>
                        <th scope="col" class="col-9">Tarea</th>
                        <th scope="col">Estado</th>
                        <th scope="col">Fecha de Vencimiento</th>
                    </tr>
                </thead>
                <tbody class="listData">
                    <tr>
                        <th scope="row">1</th>
                        <td>Mark</td>
                        <td>
                            <div class="dropdown">
                                <button class="btn btn-secondary  btn-sm dropdown-toggle statusBtn" type="button"
                                    id="dropdownExample1" data-toggle="dropdown" aria-haspopup="true"
                                    aria-expanded="false">
                                    Pendiente
                                </button>
                                <div class="dropdown-menu" aria-labelledby="dropdownMenuButton">
                                    <a class="dropdown-item" href="#">Pendiente</a>
                                    <a class="dropdown-item" href="#">En progreso</a>
                                    <a class="dropdown-item" href="#">Completado</a>
                                </div>
                            </div>
                        </td>
                        <td>@mdo</td>
                    </tr>
                    <tr>
                        <th scope="row">2</th>
                        <td>Jacob</td>
                        <td>
                            <div class="dropdown">
                                <button class="btn btn-secondary  btn-sm dropdown-toggle statusBtn" type="button"
                                    id="dropdownExample2" data-toggle="dropdown" aria-haspopup="true"
                                    aria-expanded="false">
                                    Pendiente
                                </button>
                                <div class="dropdown-menu" aria-labelledby="dropdownMenuButton">
                                    <a class="dropdown-item" href="#">Pendiente</a>
                                    <a class="dropdown-item" href="#">En progreso</a>
                                    <a class="dropdown-item" href="#">Completado</a>
                                </div>
                            </div>
                        </td>
                        <td>@fat</td>
                    </tr>
                    <tr>
                        <th scope="row">2</th>
                        <td>Jacob</td>
                        <td>
                            <div class="dropdown">
                                <button class="btn btn-secondary  btn-sm dropdown-toggle statusBtn" type="button"
                                    id="dropdownExample3" data-toggle="dropdown" aria-haspopup="true"
                                    aria-expanded="false">
                                    Pendiente
                                </button>
                                <div class="dropdown-menu" aria-labelledby="dropdownMenuButton">
                                    <a class="dropdown-item" href="#">Pendiente</a>
                                    <a class="dropdown-item" href="#">En progreso</a>
                                    <a class="dropdown-item" href="#">Completado</a>
                                </div>
                            </div>
                        </td>
                        <td>@fat</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>



    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</body>

</html>
